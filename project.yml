name: Aether
options:
  bundleIdPrefix: com.aether
  deploymentTarget:
    macOS: "14.0"
  generateEmptyDirectories: true
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: 6.0
    DEBUG_INFORMATION_FORMAT: dwarf-with-dsym
    ALWAYS_SEARCH_USER_PATHS: NO

targets:

  # ── AetherCore ─────────────────────────────────────────────────────────
  AetherCore:
    type: framework
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: Sources/AetherCore
        excludes:
          - "**/*.md"
    settings:
      base:
        PRODUCT_NAME: AetherCore
        DEFINES_MODULE: YES
        SKIP_INSTALL: YES
        GENERATE_INFOPLIST_FILE: YES

  # ── AetherUI ───────────────────────────────────────────────────────────
  AetherUI:
    type: framework
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: Sources/AetherUI
        excludes:
          - "**/*.md"
    dependencies:
      - target: AetherCore
    settings:
      base:
        PRODUCT_NAME: AetherUI
        DEFINES_MODULE: YES
        SKIP_INSTALL: YES
        GENERATE_INFOPLIST_FILE: YES

  # ── AetherApp ──────────────────────────────────────────────────────────
  AetherApp:
    type: application
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: Sources/AetherApp
        excludes:
          - "Resources/**"
          - "**/*.md"
    resources:
      - path: Sources/AetherApp/Resources/Assets.xcassets
    infoPlist:
      path: Sources/AetherApp/Resources/Info.plist
      properties:
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: true
          NSAllowsArbitraryLoadsForMedia: true
        NSURLSessionHTTP3Disable: true
    dependencies:
      - target: AetherCore
      - target: AetherUI
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.aether.iptv
        PRODUCT_NAME: Aether
        EXECUTABLE_NAME: AetherApp
        GENERATE_INFOPLIST_FILE: NO
        CODE_SIGN_ENTITLEMENTS: Sources/AetherApp/Resources/AetherApp.entitlements
        CODE_SIGN_STYLE: Manual
        CODE_SIGN_IDENTITY: "-"
        DEVELOPMENT_TEAM: ""
        ENABLE_HARDENED_RUNTIME: NO
        ENABLE_APP_SANDBOX: NO
        CODE_SIGNING_REQUIRED: NO
        CODE_SIGNING_ALLOWED: NO
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        LD_RUNPATH_SEARCH_PATHS: "@executable_path/../Frameworks"

  # ── AetherTests ────────────────────────────────────────────────────────
  AetherTests:
    type: bundle.unit-test
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: Sources/AetherTests
        excludes:
          - "**/*.md"
    dependencies:
      - target: AetherCore

schemes:
  Aether:
    build:
      targets:
        AetherApp: all
        AetherCore: all
        AetherUI: all
    run:
      config: Debug
      executable: AetherApp
    test:
      config: Debug
      targets:
        - name: AetherTests
          parallelizable: true
    profile:
      config: Release
      executable: AetherApp
    archive:
      config: Release
