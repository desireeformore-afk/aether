name: Aether
options:
  bundleIdPrefix: com.aether
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: 6.0
    ENABLE_HARDENED_RUNTIME: YES
    DEBUG_INFORMATION_FORMAT: dwarf-with-dsym

packages:
  # No external deps — all code is local

targets:

  # ── AetherCore (framework) ─────────────────────────────────────────────
  AetherCore:
    type: framework
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: Sources/AetherCore
    settings:
      base:
        PRODUCT_NAME: AetherCore
        DEFINES_MODULE: YES
        SWIFT_VERSION: 6.0

  # ── AetherUI (framework) ───────────────────────────────────────────────
  AetherUI:
    type: framework
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: Sources/AetherUI
    dependencies:
      - target: AetherCore
    settings:
      base:
        PRODUCT_NAME: AetherUI
        DEFINES_MODULE: YES
        SWIFT_VERSION: 6.0

  # ── AetherApp (macOS Application) ─────────────────────────────────────
  AetherApp:
    type: application
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: Sources/AetherApp
    resources:
      - path: Sources/AetherApp/Resources/Assets.xcassets
    dependencies:
      - target: AetherCore
      - target: AetherUI
    info:
      path: Sources/AetherApp/Resources/Info.plist
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.aether.iptv
        PRODUCT_NAME: Aether
        INFOPLIST_FILE: Sources/AetherApp/Resources/Info.plist
        CODE_SIGN_STYLE: Automatic
        SWIFT_VERSION: 6.0
        ENABLE_HARDENED_RUNTIME: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        # Required for AVFoundation/network access
        ENABLE_APP_SANDBOX: NO

  # ── AetherTests ────────────────────────────────────────────────────────
  AetherTests:
    type: bundle.unit-test
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: Sources/AetherTests
    dependencies:
      - target: AetherCore

schemes:
  Aether:
    build:
      targets:
        AetherApp: all
        AetherCore: all
        AetherUI: all
    run:
      config: Debug
      executable: AetherApp
    test:
      config: Debug
      targets:
        - AetherTests
    profile:
      config: Release
      executable: AetherApp
    archive:
      config: Release
