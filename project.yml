name: Aether
options:
  bundleIdPrefix: com.aether
  deploymentTarget:
    macOS: "14.0"
    iOS: "17.0"
    tvOS: "17.0"
  developmentLanguage: en
  xcodeVersion: "15.0"

settings:
  base:
    SWIFT_VERSION: "6.0"
    SWIFT_STRICT_CONCURRENCY: complete
    ENABLE_USER_SCRIPT_SANDBOXING: NO

targets:
  Aether:
    type: application
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: Sources/AetherApp
      - path: Sources/AetherCore
      - path: Sources/AetherUI
    info:
      path: Sources/AetherApp/Info.plist
      properties:
        CFBundleIdentifier: com.aether.iptv
        CFBundleName: Aether
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
    settings:
      base:
        PRODUCT_NAME: Aether
        PRODUCT_BUNDLE_IDENTIFIER: com.aether.iptv
        INFOPLIST_FILE: Sources/AetherApp/Info.plist
        SWIFT_VERSION: "6.0"
        MACOSX_DEPLOYMENT_TARGET: "14.0"
    dependencies:
      - framework: SwiftUI.framework
        implicit: true
      - framework: AVKit.framework
        implicit: true
      - framework: AVFoundation.framework
        implicit: true

  AetheriOS:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Sources/AetherAppIOS
      - path: Sources/AetherCore
      - path: Sources/AetherUI
    info:
      path: AetheriOS/Info.plist
      properties:
        CFBundleIdentifier: com.aether.iptv.ios
        CFBundleName: Aether
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
    settings:
      base:
        PRODUCT_NAME: Aether
        PRODUCT_BUNDLE_IDENTIFIER: com.aether.iptv.ios
        INFOPLIST_FILE: AetheriOS/Info.plist
        SWIFT_VERSION: "6.0"
        IPHONEOS_DEPLOYMENT_TARGET: "17.0"
        TARGETED_DEVICE_FAMILY: "1,2"
    dependencies:
      - framework: SwiftUI.framework
        implicit: true
      - framework: AVKit.framework
        implicit: true
      - framework: AVFoundation.framework
        implicit: true

  AethertvOS:
    type: application
    platform: tvOS
    deploymentTarget: "17.0"
    sources:
      - path: Sources/AetherAppTV
      - path: Sources/AetherCore
      - path: Sources/AetherUI
    info:
      path: AethertvOS/Info.plist
      properties:
        CFBundleIdentifier: com.aether.iptv.tvos
        CFBundleName: Aether
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
    settings:
      base:
        PRODUCT_NAME: Aether
        PRODUCT_BUNDLE_IDENTIFIER: com.aether.iptv.tvos
        INFOPLIST_FILE: AethertvOS/Info.plist
        SWIFT_VERSION: "6.0"
        TVOS_DEPLOYMENT_TARGET: "17.0"
    dependencies:
      - framework: SwiftUI.framework
        implicit: true
      - framework: AVKit.framework
        implicit: true
      - framework: AVFoundation.framework
        implicit: true
