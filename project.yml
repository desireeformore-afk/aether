name: Aether
options:
  bundleIdPrefix: com.aether
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true
  postGenCommand: echo "Xcode project generated ✅"

settings:
  base:
    SWIFT_VERSION: 6.0
    SWIFT_STRICT_CONCURRENCY: complete
    ENABLE_TESTABILITY: YES
    DEBUG_INFORMATION_FORMAT: dwarf-with-dsym

targets:
  AetherApp:
    type: application
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: Sources/AetherApp
        excludes:
          - Resources/Info.plist
          - Resources/AetherApp.entitlements
      - path: Sources/AetherCore
      - path: Sources/AetherUI
    resources:
      - path: Sources/AetherApp/Resources/Assets.xcassets
    info:
      path: Sources/AetherApp/Resources/Info.plist
      properties:
        CFBundleName: Aether
        CFBundleDisplayName: Aether
        CFBundleIdentifier: com.aether.iptv
        CFBundleVersion: "7"
        CFBundleShortVersionString: "0.7.0"
        CFBundlePackageType: APPL
        CFBundleExecutable: AetherApp
        CFBundleIconName: AppIcon
        LSMinimumSystemVersion: "14.0"
        NSPrincipalClass: NSApplication
        NSHighResolutionCapable: true
        NSSupportsAutomaticTermination: false
        NSPersistentStoreCoordinatorDescription: Aether IPTV Player for macOS
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: true
    entitlements:
      path: Sources/AetherApp/Resources/AetherApp.entitlements
      properties:
        com.apple.security.app-sandbox: false
        com.apple.security.network.client: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.aether.iptv
        PRODUCT_NAME: AetherApp
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        SWIFT_VERSION: "6.0"
        SWIFT_STRICT_CONCURRENCY: complete
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: Sources/AetherApp/Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: Sources/AetherApp/Resources/AetherApp.entitlements
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGNING_REQUIRED: NO
        CODE_SIGNING_ALLOWED: YES
        ENABLE_HARDENED_RUNTIME: NO
        LD_RUNPATH_SEARCH_PATHS: "@executable_path/../Frameworks"
        FRAMEWORK_SEARCH_PATHS: "$(inherited)"
        OTHER_SWIFT_FLAGS: "$(inherited)"
      configs:
        Debug:
          SWIFT_OPTIMIZATION_LEVEL: "-Onone"
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: DEBUG
        Release:
          SWIFT_OPTIMIZATION_LEVEL: "-O"
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: RELEASE

  AetherTests:
    type: bundle.unit-test
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: Sources/AetherTests
    dependencies:
      - target: AetherApp
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.aether.iptv.tests
        SWIFT_VERSION: "6.0"
        SWIFT_STRICT_CONCURRENCY: complete
        GENERATE_INFOPLIST_FILE: YES

schemes:
  AetherApp:
    build:
      targets:
        AetherApp: all
    run:
      config: Debug
      commandLineArguments: {}
      environmentVariables: {}
    test:
      config: Debug
      targets:
        - AetherTests
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
