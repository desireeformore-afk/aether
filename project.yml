name: Aether
options:
  bundleIdPrefix: com.aether
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: false

settings:
  base:
    SWIFT_VERSION: "6.0"
    SWIFT_STRICT_CONCURRENCY: complete
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    ENABLE_TESTABILITY: YES

targets:

  # ── AetherCore (framework) ──────────────────────────────────────────────────
  AetherCore:
    type: framework
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: Sources/AetherCore
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.aether.core
        PRODUCT_NAME: AetherCore
        DEFINES_MODULE: YES
        SKIP_INSTALL: YES
        SWIFT_VERSION: "6.0"
        SWIFT_STRICT_CONCURRENCY: complete
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGNING_REQUIRED: NO
        GENERATE_INFOPLIST_FILE: YES

  # ── AetherUI (framework) ────────────────────────────────────────────────────
  AetherUI:
    type: framework
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: Sources/AetherUI
    dependencies:
      - target: AetherCore
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.aether.ui
        PRODUCT_NAME: AetherUI
        DEFINES_MODULE: YES
        SKIP_INSTALL: YES
        SWIFT_VERSION: "6.0"
        SWIFT_STRICT_CONCURRENCY: complete
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGNING_REQUIRED: NO
        GENERATE_INFOPLIST_FILE: YES

  # ── AetherApp (macOS application) ──────────────────────────────────────────
  AetherApp:
    type: application
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: Sources/AetherApp
        excludes:
          - Resources/Info.plist
          - Resources/AetherApp.entitlements
    resources:
      - path: Sources/AetherApp/Resources/Assets.xcassets
    dependencies:
      - target: AetherCore
        embed: true
      - target: AetherUI
        embed: true
    info:
      path: Sources/AetherApp/Resources/Info.plist
      properties:
        CFBundleName: Aether
        CFBundleDisplayName: Aether
        CFBundleIdentifier: com.aether.iptv
        CFBundleVersion: "7"
        CFBundleShortVersionString: "0.7.0"
        CFBundlePackageType: APPL
        CFBundleExecutable: AetherApp
        CFBundleIconName: AppIcon
        LSMinimumSystemVersion: "14.0"
        NSPrincipalClass: NSApplication
        NSHighResolutionCapable: true
        NSSupportsAutomaticTermination: false
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: true
    entitlements:
      path: Sources/AetherApp/Resources/AetherApp.entitlements
      properties:
        com.apple.security.app-sandbox: false
        com.apple.security.network.client: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.aether.iptv
        PRODUCT_NAME: AetherApp
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: Sources/AetherApp/Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: Sources/AetherApp/Resources/AetherApp.entitlements
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGNING_REQUIRED: NO
        CODE_SIGNING_ALLOWED: YES
        ENABLE_HARDENED_RUNTIME: NO
        LD_RUNPATH_SEARCH_PATHS: "@executable_path/../Frameworks"
      configs:
        Debug:
          SWIFT_OPTIMIZATION_LEVEL: "-Onone"
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: DEBUG
        Release:
          SWIFT_OPTIMIZATION_LEVEL: "-O"

  # ── AetherTests ─────────────────────────────────────────────────────────────
  AetherTests:
    type: bundle.unit-test
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: Sources/AetherTests
    dependencies:
      - target: AetherCore
      - target: AetherApp
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.aether.iptv.tests
        SWIFT_VERSION: "6.0"
        GENERATE_INFOPLIST_FILE: YES
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGNING_REQUIRED: NO

schemes:
  AetherApp:
    build:
      targets:
        AetherCore: all
        AetherUI: all
        AetherApp: all
        AetherTests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - AetherTests
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
