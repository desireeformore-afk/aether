name: Aether
options:
  bundleIdPrefix: com.aether
  deploymentTarget:
    macOS: "14.0"
  developmentLanguage: en
  xcodeVersion: "15.0"

settings:
  base:
    SWIFT_VERSION: "6.0"
    SWIFT_STRICT_CONCURRENCY: complete
    ENABLE_USER_SCRIPT_SANDBOXING: NO
    ENABLE_MODULE_VERIFIER: NO
    CLANG_WARN_QUOTED_INCLUDE_IN_FRAMEWORK_HEADER: NO
    OTHER_CFLAGS:
      - "$(inherited)"
      - "-Wno-incomplete-umbrella"
      - "-Wno-ignored-attributes"
    OTHER_SWIFT_FLAGS:
      - "$(inherited)"
      - "-Xcc"
      - "-Wno-incomplete-umbrella"
      - "-Xcc"
      - "-Wno-ignored-attributes"

targets:
  AetherCore:
    type: framework
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: Sources/AetherCore
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.aether.AetherCore
        GENERATE_INFOPLIST_FILE: YES
        SWIFT_VERSION: "6.0"
        SWIFT_STRICT_CONCURRENCY: complete
        MACOSX_DEPLOYMENT_TARGET: "14.0"
    dependencies:
      - framework: .vlckit/VLCKit.xcframework
      - framework: Security.framework
        implicit: true

  AetherUI:
    type: framework
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: Sources/AetherUI
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.aether.AetherUI
        GENERATE_INFOPLIST_FILE: YES
        SWIFT_VERSION: "6.0"
        SWIFT_STRICT_CONCURRENCY: complete
        MACOSX_DEPLOYMENT_TARGET: "14.0"
    dependencies:
      - target: AetherCore

  AetherApp:
    type: application
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: Sources/AetherApp
    info:
      path: Sources/AetherApp/Info.plist
      properties:
        CFBundleIdentifier: com.aether.iptv
        CFBundleName: Aether
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
    settings:
      base:
        PRODUCT_NAME: AetherApp
        PRODUCT_BUNDLE_IDENTIFIER: com.aether.iptv
        INFOPLIST_FILE: Sources/AetherApp/Info.plist
        GENERATE_INFOPLIST_FILE: NO
        CODE_SIGN_ENTITLEMENTS: Sources/AetherApp/Resources/AetherApp.entitlements
        SWIFT_VERSION: "6.0"
        SWIFT_STRICT_CONCURRENCY: complete
        MACOSX_DEPLOYMENT_TARGET: "14.0"
    dependencies:
      - target: AetherCore
        embed: true
      - target: AetherUI
        embed: true
      - framework: .vlckit/VLCKit.xcframework
        embed: true
      - framework: SwiftUI.framework
        implicit: true
      - framework: AVKit.framework
        implicit: true
      - framework: AVFoundation.framework
        implicit: true
