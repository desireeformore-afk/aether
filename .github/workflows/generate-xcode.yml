name: Generate Xcode Project

on:
  workflow_dispatch:
  push:
    paths:
      - 'project.yml'
      - '**/Info.plist'

jobs:
  generate-xcode:
    runs-on: macos-15
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Install XcodeGen
        run: |
          brew install xcodegen
          xcodegen --version
      
      - name: Generate Xcode Project
        run: |
          xcodegen generate
          ls -la Aether.xcodeproj/
      
      - name: Verify Project
        run: |
          if [ ! -d "Aether.xcodeproj" ]; then
            echo "ERROR: Aether.xcodeproj not generated"
            exit 1
          fi
          echo "✓ Xcode project generated successfully"
      
      - name: Commit Generated Project
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Aether.xcodeproj/
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Generate Xcode project from project.yml [skip ci]"
            git push
          fi
