name: Build & Test

on:
  push:
    branches: ["*"]
    paths-ignore:
      - "**.md"
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Build (macOS)
        run: swift build --target AetherCore --target AetherUI --target AetherApp 2>&1

      - name: Test
        run: swift test 2>&1
