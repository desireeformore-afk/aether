name: Build & Test

on:
  push:
    branches: ["*"]
    paths-ignore:
      - "**.md"
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode 16.2
        run: sudo xcode-select -s /Applications/Xcode_16.2.app/Contents/Developer

      - name: Build (macOS)
        run: swift build --target AetherCore --target AetherUI --target AetherApp 2>&1

      - name: Test
        run: swift test --enable-xctest 2>&1
